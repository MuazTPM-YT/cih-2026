# Field-client config sample — Contract 4 shape. OWNER: Twaha.
# Copy and adjust per device. The PSK file is NEVER committed (see .gitignore).

[link]
bandwidth_bps = 56000      # pace below the 64 kbps ceiling
symbol_size = 1100         # fit one UDP datagram under a 1500 MTU
overhead_factor = 1.4      # first-burst repair margin for ~25% loss

[retry]
nack_timeout_ms = 2000     # receiver decode-stall trigger
retry_backoff_ms = 3000    # re-burst schedule
max_retries = 8            # then mark the bundle 'stuck' (never silently dropped)
# The knobs below are OPTIONAL (each has a built-in default); shown here for tuning.
circuit_breaker_threshold = 3   # Fix F4: consecutive STUCK bundles that trip the dead-link
                                # breaker; then bundles are probed with a 1-retry budget so a
                                # blackout reaches STUCK fast instead of burning the full budget
                                # per bundle. 0 disables the breaker. Any delivery resets it.
circuit_cooldown_ms = 5000      # Fix F4: idle wait between probes once the breaker is tripped.
stuck_retry_backoff_ms = 15000  # Fix F1: how long a bundle sits STUCK before the daemon auto
                                # re-arms it for another delivery pass (incl. peer-relay failover).
max_stuck_retries = 5           # Fix F1: cap on daemon auto re-arm passes; past this the bundle
                                # stays STUCK (kept, visible) until `tgw-field requeue` is run.

[net]
gateway_addr = "192.168.1.50:47000"   # where the gateway (or netsim) listens
listen_addr = "0.0.0.0:47000"         # local bind for return frames (receipts/NACKs)
http_addr = "0.0.0.0:8080"            # unused on the field side; present for symmetry

[crypto]
key_file = "./keys/device-a.key"      # 32-byte PSK; generate with `tgw-field keygen`

[media]
image_max_bytes = 30000    # JPEG recompression target for photos

# [relay] — peer-relay fallback (Fix 2). OPTIONAL; omit the whole section to keep it disabled.
# When enabled, if the direct gateway link yields no receipt within the retry budget, the
# device hands its STILL-SEALED bundle to a nearby peer to forward. The relay peer only ever
# holds ciphertext — it can neither decrypt the payload nor forge a receipt.
# [relay]
# enabled = false
# discovery_addr = "239.255.7.66:47555"      # site-local multicast group (default); joined with
#                                            # loopback so two instances on ONE host converge too.
#                                            # A subnet broadcast ("255.255.255.255:47555") also works.
# relay_listen_addr = "192.168.1.11:47556"   # THIS device's reachable LAN addr (not 0.0.0.0)
# announce_interval_ms = 2000
# peer_ttl_ms = 8000
